use_default_settings: true

general:
  instance_name: "AI Search Stack (Tor)"

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "replace-me-with-a-long-random-secret"
  limiter: false
  image_proxy: true
  public_instance: false

ui:
  static_use_hash: true

valkey:
  url: redis://redis:6379/0

outgoing:
  request_timeout: 20.0
  max_request_timeout: 30.0
  proxies:
    all://:
      - socks5h://tor:9050

engines:
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
