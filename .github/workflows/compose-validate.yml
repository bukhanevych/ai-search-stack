name: Validate Compose

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate base compose
        run: docker compose -f compose.yaml config > /dev/null

      - name: Validate tor compose override
        run: docker compose -f compose.yaml -f compose.tor.yaml config > /dev/null
